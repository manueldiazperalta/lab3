apiVersion: v1
kind: Pod
metadata:
  # Nombre personalizado para identificar este agente en el clúster
  name: jenkins-agent-manuel-diaz
  labels:
    app: jenkins-agent-manuel-diaz
spec:
  containers:
  - name: node-docker-kubectl
    image: jenkins/inbound-agent:3355.v388858a_47b_33-3-jdk21
    # Asignamos recursos para evitar el error de memoria (OOMKilled)
    resources:
      requests:
        memory: "1Gi"
        cpu: "500m"
      limits:
        memory: "2Gi"
        cpu: "1000m"
    # El comando 'cat' mantiene el pod vivo mientras el pipeline corre
    command: ['cat']
    tty: true
    volumeMounts:
    - name: docker-socket
      mountPath: /var/run/docker.sock
  volumes:
  - name: docker-socket
    hostPath:
      # Este montaje es crítico para que el agente pueda hacer 'docker build'
      path: /var/run/docker.sock
